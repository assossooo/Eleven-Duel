<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; }
body {
  background:#0a0817; color:#eef0ff;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  overflow-x:hidden; min-height:100%;
  padding-bottom:env(safe-area-inset-bottom);
}
.hidden { display:none !important; }
.screen { max-width:520px; margin:0 auto; padding:16px 14px 40px; }

/* ------ titres façon brush ------ */
.brush { font-weight:900; font-style:italic; text-transform:uppercase; letter-spacing:0.5px; }

/* ------ HOME ------ */
.lang-row { display:flex; justify-content:flex-end; gap:6px; margin-bottom:2px; }
.lang-chip {
  background:#151228; border:1px solid #2c2750; color:#9aa; border-radius:8px;
  padding:5px 10px; font-size:0.8rem; font-weight:700;
}
.lang-active { border-color:#27c3f5; color:#27c3f5; background:#102035; }
.home-top { display:flex; justify-content:flex-end; align-items:center; margin-bottom:4px; }
.coins-pill {
  background:#151228; border:1px solid #f5b31c55; color:#f5b31c;
  border-radius:20px; padding:5px 12px; font-weight:800; font-size:0.9rem;
}
.logo-wrap { text-align:center; margin:6px 0 10px; }
.logo-wrap img { width:190px; height:190px; border-radius:24px; box-shadow:0 8px 40px #27c3f533; }
.tagline { text-align:center; color:#9aa; font-size:0.92rem; margin:0 8px 16px; line-height:1.45; }
.select-label { text-align:center; color:#8b8fa8; font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.prof-row { display:flex; gap:8px; justify-content:center; margin-bottom:14px; flex-wrap:wrap; }
.prof-chip {
  background:#151228; border:1px solid #2c2750; color:#cfd2ea; border-radius:12px;
  padding:8px 12px; font-size:0.85rem; font-weight:700;
}
.prof-active { border-color:#f5b31c; color:#f5b31c; background:#241c10; }
.lg-row { display:flex; gap:6px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
.lg-chip {
  background:#151228; border:1px solid #2c2750; color:#cfd2ea; border-radius:12px;
  padding:7px 10px; font-size:0.8rem; font-weight:700;
}
.lg-active { border-color:#27c3f5; color:#27c3f5; background:#102035; }
.home-btns { display:flex; flex-direction:column; gap:12px; }
.big-btn {
  border:none; border-radius:16px; padding:16px; font-size:1.15rem; font-weight:900;
  font-style:italic; text-transform:uppercase; letter-spacing:0.5px; color:#0a0817;
  background:linear-gradient(135deg, #27c3f5, #1c8ef5); box-shadow:0 6px 20px #27c3f544;
}
.big-btn:active { transform:scale(0.97); }
.big-btn.gold { background:linear-gradient(135deg, #f5b31c, #f5731c); box-shadow:0 6px 20px #f5b31c44; }
.big-btn.pink { background:linear-gradient(135deg, #f52c8c, #8b3df5); color:#fff; box-shadow:0 6px 20px #f52c8c44; }
.big-btn.ghost { background:#151228; color:#cfd2ea; border:1px solid #2c2750; box-shadow:none; font-size:1rem; }

/* ------ GAME HUD ------ */
.hud-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.hud-round { font-size:1rem; color:#f5b31c; }
.hud-league { font-size:0.78rem; color:#8b8fa8; font-weight:700; }
.hud-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.hud-cell { background:#151228; border-radius:12px; padding:8px 10px; border:1px solid #2c2750; }
.hud-out { opacity:0.45; }
.hud-label { font-size:0.72rem; color:#8b8fa8; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hud-nums { display:flex; justify-content:space-between; align-items:baseline; }
.hud-budget { font-weight:900; font-size:1.05rem; }
.hud-count { font-size:0.78rem; color:#8b8fa8; font-weight:700; }
.hud-barwrap { height:5px; background:#0a0817; border-radius:3px; margin-top:5px; overflow:hidden; }
.hud-bar { height:100%; border-radius:3px; transition:width 0.4s; }
.hud-cyan .hud-budget { color:#27c3f5; } .hud-cyan .hud-bar { background:#27c3f5; }
.hud-pink .hud-budget { color:#f52c8c; } .hud-pink .hud-bar { background:#f52c8c; }
.hud-orange .hud-budget { color:#f5731c; } .hud-orange .hud-bar { background:#f5731c; }
.hud-violet .hud-budget { color:#8b3df5; } .hud-violet .hud-bar { background:#8b3df5; }

/* ------ CARTE JOUEUR ------ */
.player-card {
  border-radius:20px; padding:20px 16px; text-align:center; margin-bottom:12px;
  border:2px solid; position:relative; animation:cardIn 0.45s ease; overflow:hidden;
}
.player-card.skinned .pc-note, .player-card.skinned .pc-name,
.player-card.skinned .pc-pos, .player-card.skinned .pc-club { position:relative; z-index:2; }
@keyframes cardIn { from { transform:translateY(18px) scale(0.95); opacity:0; } to { transform:none; opacity:1; } }
.tier-gold { background:linear-gradient(160deg, #2a2008, #151228); border-color:#f5b31c; box-shadow:0 0 30px #f5b31c33; }
.tier-pink { background:linear-gradient(160deg, #2a0818, #151228); border-color:#f52c8c; box-shadow:0 0 26px #f52c8c33; }
.tier-cyan { background:linear-gradient(160deg, #08202a, #151228); border-color:#27c3f5; box-shadow:0 0 22px #27c3f533; }
.tier-grey { background:linear-gradient(160deg, #1a1830, #151228); border-color:#3c3860; }
.pc-note { font-size:2.6rem; font-weight:900; line-height:1; }
.tier-gold .pc-note { color:#f5b31c; } .tier-pink .pc-note { color:#f52c8c; }
.tier-cyan .pc-note { color:#27c3f5; } .tier-grey .pc-note { color:#b8bce0; }
.pc-name { font-size:1.5rem; font-weight:900; font-style:italic; text-transform:uppercase; margin:4px 0 2px; }
.pc-pos { color:#cfd2ea; font-size:0.9rem; font-weight:700; }
.pc-club { color:#8b8fa8; font-size:0.82rem; margin-top:2px; }

/* ------ TIMER ------ */
.timer-wrap { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.timer-track { flex:1; height:8px; background:#151228; border-radius:4px; overflow:hidden; border:1px solid #2c2750; }
#timer-bar { height:100%; background:linear-gradient(90deg, #27c3f5, #f5b31c); border-radius:4px; }
#timer-sec { font-weight:900; color:#f5b31c; min-width:34px; text-align:right; font-size:0.95rem; }

/* ------ MISES ------ */
.bid-zone { background:#151228; border-radius:16px; padding:14px; border:1px solid #2c2750; }
.bid-input-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
#bid-input {
  flex:1; background:#0a0817; border:1px solid #2c2750; color:#fff; border-radius:12px;
  padding:12px; font-size:1.4rem; font-weight:900; text-align:center; -webkit-appearance:none;
}
.bid-m { font-weight:900; color:#8b8fa8; font-size:1.1rem; }
#bid-slider { width:100%; margin:2px 0 10px; -webkit-appearance:none; height:6px; border-radius:3px; background:#0a0817; outline:none; }
#bid-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:26px; height:26px; border-radius:50%;
  background:#27c3f5; border:3px solid #0a0817; box-shadow:0 0 10px #27c3f588;
}
.chip-row { display:flex; gap:6px; justify-content:center; margin-bottom:10px; flex-wrap:wrap; }
.chip-bump {
  background:#0a0817; border:1px solid #2c2750; color:#cfd2ea; border-radius:10px;
  padding:8px 10px; font-weight:800; font-size:0.82rem;
}
.chip-bump[data-n="allin"] { border-color:#f52c8c; color:#f52c8c; }
.bid-max-label { text-align:center; color:#8b8fa8; font-size:0.75rem; margin-bottom:10px; }
.bid-btns { display:flex; gap:10px; }
.bid-btns button {
  flex:1; border:none; border-radius:12px; padding:14px; font-size:1.05rem; font-weight:900;
  font-style:italic; text-transform:uppercase;
}
#btn-pass { background:#1d1936; color:#8b8fa8; border:1px solid #2c2750; }
#btn-pass:disabled { opacity:0.45; }
#btn-bid { background:linear-gradient(135deg, #f5b31c, #f5731c); color:#0a0817; box-shadow:0 4px 16px #f5b31c44; }
#btn-bid:active { transform:scale(0.97); }
.auto-pass { text-align:center; color:#8b8fa8; padding:18px 10px; font-weight:700; }

/* ------ BONUS BAR ------ */
.bonus-bar { display:flex; gap:6px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
.bonus-chip {
  background:#1d1936; border:1px solid #f5b31c66; color:#f5b31c; border-radius:10px;
  padding:7px 10px; font-weight:800; font-size:0.78rem; display:flex; align-items:center; gap:5px;
}
.bonus-off { opacity:0.35; border-color:#2c2750; color:#8b8fa8; }
.bonus-emoji { font-size:1rem; }

.game-links { display:flex; gap:10px; justify-content:center; margin-top:12px; flex-wrap:wrap; }
.link-btn { background:none; border:none; color:#27c3f5; font-size:0.85rem; font-weight:700; text-decoration:underline; }
.link-btn.danger { color:#f52c8c; }

/* ------ OVERLAYS ------ */
.overlay {
  position:fixed; inset:0; background:#0a0817ee; z-index:50;
  display:flex; align-items:center; justify-content:center; padding:18px;
}
.overlay-box {
  background:#151228; border:1px solid #2c2750; border-radius:20px;
  padding:20px 16px; max-width:480px; width:100%; max-height:86vh; overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.rv-title { text-align:center; font-size:1.2rem; color:#f5b31c; margin-bottom:4px; }
.rv-player { text-align:center; color:#cfd2ea; font-weight:800; margin-bottom:14px; }
.rv-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.rv-grid.rv-n3, .rv-grid.rv-n4 { grid-template-columns:1fr 1fr; }
.rv-cell { border-radius:14px; padding:12px 8px; text-align:center; border:1px solid #2c2750; background:#0a0817; }
.rv-side { font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rv-amt { font-size:1.5rem; font-weight:900; }
.rv-cyan .rv-side, .rv-cyan .rv-amt { color:#27c3f5; }
.rv-pink .rv-side, .rv-pink .rv-amt { color:#f52c8c; }
.rv-orange .rv-side, .rv-orange .rv-amt { color:#f5731c; }
.rv-violet .rv-side, .rv-violet .rv-amt { color:#8b3df5; }
.rv-winner { border-color:#f5b31c; box-shadow:0 0 14px #f5b31c44; }
.slam-in { animation:slam 0.4s cubic-bezier(0.2, 1.4, 0.4, 1) both; }
@keyframes slam { from { transform:scale(1.6); opacity:0; } to { transform:none; opacity:1; } }
.rv-result { text-align:center; font-weight:800; padding:10px; border-radius:12px; margin-bottom:12px; font-size:0.95rem; }
.rv-win { background:#f5b31c22; color:#f5b31c; }
.rv-lose { background:#f52c8c18; color:#f52c8c; }
.rv-tie { background:#27c3f518; color:#27c3f5; }
.rv-waiting { text-align:center; color:#8b8fa8; font-weight:700; padding:22px 8px; }
.rv-next { width:100%; border:none; border-radius:12px; padding:14px; font-weight:900; font-style:italic;
  text-transform:uppercase; font-size:1rem; background:linear-gradient(135deg, #27c3f5, #1c8ef5); color:#0a0817; }

.rules-title { text-align:center; font-size:1.3rem; color:#f5b31c; margin-bottom:12px; }
.rules-body { list-style:none; }
.rules-body li { padding:7px 0 7px 24px; position:relative; color:#cfd2ea; font-size:0.9rem; line-height:1.45; border-bottom:1px solid #1d1936; }
.rules-body li:before { content:"\26bd"; position:absolute; left:0; top:8px; font-size:0.8rem; }

/* ------ EFFECTIFS ------ */
.sq-head { display:flex; justify-content:space-between; align-items:baseline; margin:12px 0 6px; }
.sq-title { font-weight:900; font-style:italic; text-transform:uppercase; font-size:0.95rem; }
.sq-title.you { color:#27c3f5; } .sq-title.ai { color:#f52c8c; }
.sq-avg { color:#f5b31c; font-weight:800; font-size:0.85rem; }
.squad-row { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid #1d1936; }
.squad-pos { width:22px; height:22px; border-radius:6px; font-size:0.7rem; font-weight:900; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pos-G { background:#f5b31c22; color:#f5b31c; } .pos-D { background:#27c3f522; color:#27c3f5; }
.pos-M { background:#8b3df522; color:#b489f8; } .pos-A { background:#f52c8c22; color:#f52c8c; }
.squad-name { flex:1; font-weight:700; font-size:0.88rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.squad-paid { color:#8b8fa8; font-size:0.78rem; font-weight:700; }
.squad-note { font-weight:900; font-size:0.9rem; width:26px; text-align:right; }
.squad-note.tier-gold { color:#f5b31c; } .squad-note.tier-pink { color:#f52c8c; }
.squad-note.tier-cyan { color:#27c3f5; } .squad-note.tier-grey { color:#b8bce0; }
.squad-empty { color:#3c3860; text-align:center; padding:8px; }

/* ------ FIN ------ */
.end-box { text-align:center; border-radius:20px; padding:26px 16px 20px; margin-bottom:14px; border:2px solid; }
.end-win { border-color:#f5b31c; background:linear-gradient(160deg, #2a2008, #151228); box-shadow:0 0 40px #f5b31c33; }
.end-lose { border-color:#f52c8c; background:linear-gradient(160deg, #2a0818, #151228); }
.end-tie { border-color:#27c3f5; background:linear-gradient(160deg, #08202a, #151228); }
#end-title { font-size:2.1rem; line-height:1.1; }
.end-win #end-title { color:#f5b31c; } .end-lose #end-title { color:#f52c8c; } .end-tie #end-title { color:#27c3f5; }

/* ===== SKINS PREMIUM (appliqués quand .skinned) ===== */
/* GOLD — reflet brillant qui balaie */
.skin-gold.skinned, .player-card.skinned.skin-gold {
  background:linear-gradient(160deg, #3a2c08 0%, #1a1206 60%, #151228 100%);
  box-shadow:0 0 30px #f5b31c44, inset 0 0 40px #f5b31c11;
}
.skin-gold.skinned::before, .player-card.skinned.skin-gold::before {
  content:""; position:absolute; top:-40%; left:-60%; width:220%; height:60%;
  background:linear-gradient(90deg, transparent, #ffffff55, transparent);
  transform:rotate(25deg); animation:skinShine 3.5s ease-in-out infinite; z-index:1;
}
@keyframes skinShine { 0%,100%{ left:-60%; } 50%{ left:60%; } }

/* PINK — néon + trame diagonale */
.skin-pink.skinned, .player-card.skinned.skin-pink {
  background:linear-gradient(155deg, #f52c8c22, #8b3df522), radial-gradient(circle at 50% 10%, #2a0820, #0a0817 70%);
  border-color:#c14fd6; box-shadow:0 0 26px #a83df555;
}
.skin-pink.skinned::before, .player-card.skinned.skin-pink::before {
  content:""; position:absolute; inset:0; z-index:1;
  background:repeating-linear-gradient(45deg, #ffffff08 0 1px, transparent 1px 12px);
}

/* CYAN — ligne de scan animée */
.skin-cyan.skinned, .player-card.skinned.skin-cyan {
  background:#06141a;
  background-image:linear-gradient(160deg, #08303acc, #0a0817ee), repeating-linear-gradient(0deg, #27c3f512 0 1px, transparent 1px 16px);
  box-shadow:0 0 24px #27c3f544;
}
.skin-cyan.skinned::before, .player-card.skinned.skin-cyan::before {
  content:""; position:absolute; top:0; left:0; right:0; height:3px; z-index:1;
  background:linear-gradient(90deg, transparent, #27c3f5, transparent);
  animation:skinScan 2.5s linear infinite;
}
@keyframes skinScan { 0%{ transform:translateY(0); opacity:0; } 10%{opacity:1;} 90%{opacity:1;} 100%{ transform:translateY(210px); opacity:0; } }

/* GREY — texture croisée */
.skin-grey.skinned, .player-card.skinned.skin-grey {
  background:#14121f; background-image:linear-gradient(160deg, #26243a, #100e1a);
  border-color:#6a6a80; box-shadow:0 0 16px #00000066;
}
.skin-grey.skinned::before, .player-card.skinned.skin-grey::before {
  content:""; position:absolute; inset:0; z-index:1;
  background:repeating-linear-gradient(45deg, #ffffff06 0 1px, transparent 1px 10px);
}

   =================================================== */
body.theme-genesis {

    radial-gradient(circle at 20% 10%, #3a1a6b33 0%, transparent 40%),
    radial-gradient(circle at 85% 25%, #f5b31c22 0%, transparent 35%),
    radial-gradient(circle at 50% 90%, #6b1a9944 0%, transparent 45%),
    linear-gradient(160deg, #120a2e 0%, #0a0620 50%, #060312 100%) !important;
}
body.theme-genesis .genesis-fx { display:block !important; }
.genesis-fx { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.genesis-fx .g-star {
  position:absolute; border-radius:50%; background:#fff; animation:gTwinkle 3s ease-in-out infinite;
}

@keyframes gTwinkle { 0%,100%{ opacity:0.1; } 50%{ opacity:0.9; } }
.genesis-fx .g-comet {
  position:absolute; width:2px; height:2px; border-radius:50%; background:#fff;
  box-shadow:0 0 8px 2px #fff; animation:gComet 7s linear infinite; opacity:0;
}
@keyframes gComet {
  0% { transform:translate(0,0); opacity:0; }
  5% { opacity:1; }
  25% { transform:translate(-160px,160px); opacity:0; }
  100% { opacity:0; }
}
body.theme-genesis .genesis-constellation {
  position:fixed; inset:0; z-index:0; opacity:0.3; pointer-events:none;
  background-image:radial-gradient(circle, #a855f755 1px, transparent 1.5px);
  background-size:40px 40px;
}
body.theme-genesis .season-banner {
  background:linear-gradient(135deg, #2a1454cc, #4a1f7acc) !important;
  border-color:#a855f766 !important; box-shadow:0 0 30px #a855f733, inset 0 0 40px #f5b31c11 !important;
}
body.theme-genesis .cd-unit { background:#0a0620aa !important; border-color:#f5b31c55 !important; }
body.theme-genesis .cd-num { color:#ffd75e !important; text-shadow:0 0 12px #f5b31c88; }
body.theme-genesis .season-banner-sub { color:#c9b8f0 !important; }
body.theme-genesis .big-btn {
  background:linear-gradient(135deg, #f5d76e, #f5b31c) !important; color:#0a0620 !important;
  box-shadow:0 4px 20px #f5b31c44 !important;
}
body.theme-genesis .big-btn.pink, body.theme-genesis .big-btn.gold {
  background:linear-gradient(135deg, #f5d76e, #f5b31c) !important; color:#0a0620 !important;
}
body.theme-genesis .big-btn.ghost {
  background:#150a30 !important; color:#e4d9ff !important; border-color:#a855f755 !important;
}
body.theme-genesis .player-card {
  background:linear-gradient(160deg, #2a1454 0%, #150a30 60%, #0a0620 100%) !important;
  border-color:#f5b31c !important; box-shadow:0 0 30px #a855f755, inset 0 0 40px #f5b31c11 !important;
}
body.theme-genesis .player-card::after {
  content:""; position:absolute; top:-40%; left:-60%; width:220%; height:60%;
  background:linear-gradient(90deg, transparent, #ffffff44, transparent);
  transform:rotate(25deg); animation:shine 3.5s ease-in-out infinite; pointer-events:none;
}


/* ===================================================
   V9 : DASHBOARD ADMIN
   =================================================== */
.admin-summary { text-align:center; color:#f5b31c; font-weight:800; margin-bottom:12px; font-size:0.9rem; }
.admin-row {
  display:flex; align-items:center; gap:8px; padding:10px 8px; border-bottom:1px solid #1d1936; font-size:0.85rem;
}
.admin-row-pseudo { flex:1; font-weight:800; color:#eef0ff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.admin-row-country { font-size:1rem; }
.admin-row-date { color:#8b8fa8; font-size:0.75rem; min-width:70px; text-align:right; }
.admin-row-src { color:#27c3f5; font-weight:700; font-size:0.72rem; min-width:60px; text-align:right; }

.admin-match-row {
  display:flex; flex-wrap:wrap; align-items:center; gap:6px; padding:10px 8px; border-bottom:1px solid #1d1936; font-size:0.8rem;
}
.admin-match-mode { background:#151228; border:1px solid #2c2750; border-radius:8px; padding:3px 8px; font-weight:800; font-size:0.7rem; color:#27c3f5; }
.admin-match-names { flex:1; color:#cfd2ea; font-weight:700; min-width:120px; }
.admin-match-date { color:#8b8fa8; font-size:0.7rem; width:100%; }
.admin-match-winner { color:#f5b31c; font-weight:800; font-size:0.75rem; }

.admin-src-row { display:flex; align-items:center; gap:10px; padding:8px 0; }
.admin-src-label { width:80px; font-weight:800; font-size:0.82rem; color:#cfd2ea; }
.admin-src-barwrap { flex:1; height:10px; background:#151228; border-radius:5px; overflow:hidden; }
.admin-src-bar { height:100%; background:linear-gradient(90deg, #27c3f5, #f5b31c); border-radius:5px; }
.admin-src-pct { width:70px; text-align:right; font-size:0.75rem; color:#8b8fa8; font-weight:700; }


/* ===================================================
   V10 : SKIN TRIONDA (Coupe du Monde 2026, édition limitée)
   Design v5 validé : panneaux en coin + grandes icônes nationales
   =================================================== */
.trionda-skin {
  background:#ffffff !important;
  border-color:#d4a017 !important; overflow:hidden; position:relative;
}
.trionda-skin .pc-note { color:#12233a !important; text-shadow:none !important; }
.trionda-skin .pc-name { color:#1a1a2e !important; }
.trionda-skin .pc-pos { color:#39405a !important; }
.trionda-skin .pc-club { color:#5a6178 !important; }
.trionda-skin .pc-note, .trionda-skin .pc-name, .trionda-skin .pc-pos, .trionda-skin .pc-club {
  position:relative; z-index:5;
}
.trionda-skin .pc-name, .trionda-skin .pc-pos, .trionda-skin .pc-club {
  background:#ffffffee; display:inline-block; border-radius:8px; padding:1px 6px;
}

.td-panel { position:absolute; z-index:1; }
.td-panel-usa { background:#0066cc; }
.td-panel-canada { background:#e31937; }
.td-panel-mexico { background:#00a651; }
.td-panel-icon {
  position:absolute; z-index:3; top:50%; left:50%; transform:translate(-50%,-50%);
  filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3));
  background-size:contain; background-repeat:no-repeat; background-position:center;
}

/* GREY : 1 panneau (USA) */
.trionda-grey .td-panel.p1 { width:64%; height:64%; top:-14%; right:-14%; border-radius:0 0 0 100%; }
.trionda-grey .p1 .td-panel-icon { width:44%; height:44%; top:32%; left:68%; }

/* CYAN : 2 panneaux (USA + Mexique) */
.trionda-cyan { box-shadow:0 0 16px #0066cc33 !important; }
.trionda-cyan .td-panel.p1 { width:58%; height:58%; top:-12%; right:-12%; border-radius:0 0 0 100%; }
.trionda-cyan .p1 .td-panel-icon { width:46%; height:46%; top:30%; left:68%; }
.trionda-cyan .td-panel.p2 { width:56%; height:56%; bottom:-12%; left:-12%; border-radius:100% 0 0 0; }
.trionda-cyan .p2 .td-panel-icon { width:46%; height:46%; top:70%; left:30%; }

/* PINK : 2 panneaux (Canada + USA) */
.trionda-pink { box-shadow:0 0 20px #e3193744 !important; }
.trionda-pink .td-panel.p1 { width:58%; height:58%; top:-12%; left:-12%; border-radius:0 0 100% 0; }
.trionda-pink .p1 .td-panel-icon { width:46%; height:46%; top:30%; left:30%; }
.trionda-pink .td-panel.p2 { width:56%; height:56%; bottom:-12%; right:-12%; border-radius:100% 0 0 0; }
.trionda-pink .p2 .td-panel-icon { width:46%; height:46%; top:70%; left:70%; }

/* GOLD : 3 panneaux (Canada + USA + Mexique) + éclat animé */
.trionda-gold { box-shadow:0 0 30px #ffc72c77, inset 0 0 20px #ffc72c22 !important; }
.trionda-gold .td-panel.p1 { width:50%; height:50%; top:-10%; left:-10%; border-radius:0 0 100% 0; }
.trionda-gold .p1 .td-panel-icon { width:44%; height:44%; top:26%; left:26%; }
.trionda-gold .td-panel.p2 { width:50%; height:50%; top:-10%; right:-10%; border-radius:0 0 0 100%; }
.trionda-gold .p2 .td-panel-icon { width:44%; height:44%; top:26%; left:74%; }
.trionda-gold .td-panel.p3 { width:58%; height:44%; bottom:-8%; left:21%; border-radius:16px 16px 0 0; }
.trionda-gold .p3 .td-panel-icon { width:36%; height:36%; top:82%; left:50%; }
.trionda-gold .td-shine {
  content:""; position:absolute; inset:0; z-index:4; pointer-events:none;
  background:linear-gradient(115deg, transparent 20%, #ffffffaa 32%, transparent 44%);
  animation:triondaShineMove 3s ease-in-out infinite;
}
@keyframes triondaShineMove { 0%,100%{ transform:translateX(-40%); opacity:0.3; } 50%{ transform:translateX(40%); opacity:0.85; } }
.trionda-gold .pc-note { text-shadow:0 0 8px #ffc72c88 !important; }

/* mini preview cards dans le shop (même structure, taille réduite) */
.skin-mini.trionda-skin { color:#1a1a2e; }
.skin-mini.trionda-skin .skin-mini-note { color:#12233a; position:relative; z-index:5; }
.skin-mini.trionda-skin .skin-mini-lbl { color:#39405a; position:relative; z-index:5; background:#ffffffee; border-radius:6px; }

</style>

  var lang = I18N[store.lang] || I18N.fr;
  var v = lang[key];
  if (v === undefined) v = I18N.fr[key];
  return (v === undefined) ? key : v;
}
function tf(key, vars){
  var s = t(key);
  for (var k in vars){ s = s.replace("{" + k + "}", vars[k]); }
  return s;
}
function applyI18n(){
  var els = document.querySelectorAll("[data-i18n]");

}

function avgOf(p){
  if (!p.squad || p.squad.length === 0) return 0;
  var s = 0;
  for (var i=0;i<p.squad.length;i++){
    s += PLAYERS[p.squad[i]][2];
    if (p.squad[i] === p.boosted) s += 1;   /* bonus etoile */
  }
  return s / p.squad.length;
}
function posCounts(squad){
  var c = { G:0, D:0, M:0, A:0 };
  for (var i=0;i<squad.length;i++) c[PLAYERS[squad[i]][1]]++;
  return c;
}
function formationOf(squad){
  if (!squad || squad.length !== 11) return null;
  var c = posCounts(squad);
  if (c.G !== 1) return null;
  var key = c.D + "-" + c.M + "-" + c.A;
  return FORMATIONS.indexOf(key) >= 0 ? key : null;
}
function finalScore(p){
  var base = avgOf(p);
  var f = formationOf(p.squad);
  return { base: base, formation: f, total: base + (f ? FORMATION_BONUS : 0) };
}

/* classement deterministe : complets par note desc, puis incomplets, puis abandons */
function rankPlayers(players){
  var idxs = [];
  for (var i=0;i<players.length;i++) idxs.push(i);
  idxs.sort(function(a,b){
    var pa = players[a], pb = players[b];
    var ca = (pa.squad.length >= 11 && !pa.forfeit) ? 2 : (pa.forfeit ? 0 : 1);
    var cb = (pb.squad.length >= 11 && !pb.forfeit) ? 2 : (pb.forfeit ? 0 : 1);
    if (ca !== cb) return cb - ca;
    var sa = finalScore(pa).total, sb = finalScore(pb).total;
    if (sa !== sb) return sb - sa;
    if (pa.squad.length !== pb.squad.length) return pb.squad.length - pa.squad.length;
    return a - b;
  });
  return idxs;
}

function drawWeight(note){
  if (note >= 90) return 1;
  if (note >= 88) return 2;
  if (note >= 86) return 3;
  if (note >= 84) return 5;
  if (note >= 82) return 7;
  return 8;
}
function availableIdxs(league, used){
  var out = [];
  for (var i=0;i<PLAYERS.length;i++){
    if (league !== "ALL" && leagueOf(i) !== league) continue;
    if (used.indexOf(i) >= 0) continue;
    out.push(i);
  }
  return out;
}
function weightedPick(list){
  var total = 0, i;
  for (i=0;i<list.length;i++) total += drawWeight(PLAYERS[list[i]][2]);
  var r = Math.random() * total;
  for (i=0;i<list.length;i++){
    r -= drawWeight(PLAYERS[list[i]][2]);
    if (r <= 0) return list[i];
  }
  return list[list.length-1];
}

/* ---------- IA "ALI" (solo, joueur d'index 1) ---------- */
function aiValue(note){
  if (note >= 91) return 62;
  if (note >= 90) return 52;
  if (note >= 89) return 43;
  if (note >= 88) return 36;
  if (note >= 87) return 29;
  if (note >= 86) return 23;
  if (note >= 85) return 18;
  if (note >= 84) return 14;
  if (note >= 83) return 10;
  if (note >= 82) return 7;
  if (note >= 81) return 5;
  return 3;
}
function aiBid(pIdx){
  var ali = state.players[1], hum = state.players[0];
  var note = PLAYERS[pIdx][2];
  var pos = PLAYERS[pIdx][1];
  var slotsLeft = 11 - ali.squad.length;
  if (slotsLeft <= 0) return 0;
  var maxAllowed = ali.budget - (slotsLeft - 1);
  if (maxAllowed < 1) return 0;
  if (hum.squad.length >= 11 || hum.out) return 1;
  var mustBid = ali.passes >= MAX_PASSES;

  var fairShare = ali.budget / slotsLeft;
  var pace = fairShare / 22;
  if (pace < 0.45) pace = 0.45;
  if (pace > 1.7) pace = 1.7;

  var rnd = 0.75 + Math.random() * 0.6;
  var mult = 1;
  var c = posCounts(ali.squad);

  if (state.profile === "prudent"){
    mult = 0.8;
    if (note <= 83 && Math.random() < 0.5) return mustBid ? 1 : 0;
  }
  else if (state.profile === "agressif"){
    if (note >= 87) mult = 1.55;
    else mult = 0.7;
    if (note >= 84 && note <= 86 && Math.random() < 0.12) mult = 1.9;
  }
  else if (state.profile === "malin"){
    var target = { G:1, D:4, M:4, A:2 };
    if (pos === "G"){
      if (c.G >= 1) return mustBid ? 1 : ((Math.random() < 0.85) ? 0 : 1);
      mult = 1.6;
    } else {
      mult = (c[pos] < target[pos]) ? 1.25 : 0.45;
    }
  }

  var bid = Math.round(aiValue(note) * pace * mult * rnd);
  if (state.profile === "prudent"){
    var cap = Math.round(fairShare * 1.4);
    if (bid > cap) bid = cap;
  }
  if (state.profile === "malin"){
    var smart = hum.budget + 1;
    if (bid > smart) bid = smart;
  }
  var avail = availableIdxs(state.league, state.used).length;
  if (avail < slotsLeft * 2 + 4 && bid < 2) bid = 2;
  if (bid < 1) return mustBid ? 1 : ((Math.random() < 0.45) ? 0 : 1);
  if (bid > maxAllowed) bid = maxAllowed;
  return bid;
}

function checkSoloEnd(){
  var ps = state.players, i;
  /* eliminations budget */
  for (i=0;i<ps.length;i++){
    var need = 11 - ps[i].squad.length;
    if (!ps[i].out && need > 0 && ps[i].budget < need) ps[i].out = true;
  }
  var active = [], allFull = true;
  for (i=0;i<ps.length;i++){
    if (!ps[i].out){
      active.push(i);
      if (ps[i].squad.length < 11) allFull = false;
    }
  }
  if (active.length === 0) return "double";
  if (active.length === 1 && ps.length > 1 && (ps[0].out || ps[1].out)) return "elim";
  if (allFull) return "score";
  if (availableIdxs(state.league, state.used).length === 0) return "pool";
  return null;
}

function nextRound(){
  if (MODE === "online") return onlineNextRound();
  var reason = checkSoloEnd();
  if (reason) return endGame(reason);
  state.round++;
  var idx = weightedPick(availableIdxs(state.league, state.used));
  state.used.push(idx);
  state.current = idx;
  renderRound();
}

function maxBidYou(){
  if (me().squad.length >= 11) return 0;
  return me().budget;
}
function minBidYou(){
  if (!state || me().squad.length >= 11) return 0;
  return (me().passes >= MAX_PASSES) ? 1 : 0;
}

function submitBid(v){
  if (MODE === "online") return submitOnlineBid(v);
  if (state.endReason !== null || qs("overlay-reveal").classList.contains("hidden") === false) return;
  stopTimer();
  var mePl = state.players[0], ali = state.players[1];
  var aiB = ali.out ? 0 : aiBid(state.current);
  if (v === 0 && mePl.squad.length < 11 && !mePl.out) mePl.passes++;
  if (aiB === 0 && ali.squad.length < 11 && !ali.out) ali.passes++;

  var winner = -1, kind = "none";
  if (v === 0 && aiB === 0){ winner = -1; kind = "none"; }
  else if (v === aiB){ winner = -1; kind = "tie"; }
  else if (v > aiB){ winner = 0; kind = "win"; }
  else { winner = 1; kind = "win"; }

  if (winner >= 0){
    var w = state.players[winner];
    var amount = (winner === 0) ? v : aiB;
    w.budget -= amount;
    w.squad.push(state.current);
    w.paid.push(amount);
    if (w.boostPending){ w.boosted = state.current; w.boostPending = false; }
  }
  renderReveal(state.current, [v, aiB], winner, kind);
}

function endGame(reason){
  state.endReason = reason;
  stopTimer();
  hideAllScreens();
  show("screen-end");
  renderEnd(reason);
  var winner = winnerPseudoFromRanking(state.players, reason);
  writeMatchLog({
    mode: "solo",
    playersCount: state.players.length,
    players: playerLogEntries(state.players),
    winnerPseudo: winner,
    league: state.league,
    leagueCode: null
  });
}

function ordinal(r){
  if (store.lang === "en"){
    if (r === 1) return "1st"; if (r === 2) return "2nd"; if (r === 3) return "3rd"; return r + "th";
  }
  if (store.lang === "es") return r + "º";
  return (r === 1) ? "1er" : r + "e";
}

function renderEnd(reason){
  var mePl = me();
  var ranking = rankPlayers(state.players);
  var myRank = ranking.indexOf(state.myIdx);
  var scMe = finalScore(mePl);
  var topP = state.players[ranking[0]];
  var tieTop = false;
  if (ranking.length > 1){
    var s0 = finalScore(state.players[ranking[0]]).total;
    var s1 = finalScore(state.players[ranking[1]]).total;
    tieTop = (topP.squad.length >= 11 && state.players[ranking[1]].squad.length >= 11 && s0 === s1);
  }

  var box = qs("end-box");
  box.className = "end-box";
  var title = qs("end-title"), sub = qs("end-sub");
  var outcome = "lose";

  if (mePl.forfeit){
    title.textContent = t("end_forfeit"); sub.textContent = t("end_forfeit_sub");
    box.classList.add("end-lose");
  } else if (reason === "double"){
    title.textContent = t("end_double"); sub.textContent = t("end_double_sub");
    box.classList.add("end-tie"); outcome = "tie";
  } else if (mePl.out){
    title.textContent = t("end_elim"); sub.textContent = t("end_elim_sub");
    box.classList.add("end-lose");
  } else if (myRank === 0 && tieTop){
    title.textContent = t("end_tie");
    sub.textContent = tf("end_rank_sub", { r: ordinal(1), n: state.players.length, s: scMe.total.toFixed(2) });
    box.classList.add("end-tie"); outcome = "tie";
  } else if (myRank === 0){
    title.textContent = (reason === "pool") ? t("end_pool") : t("end_win");
    sub.textContent = tf("end_rank_sub", { r: ordinal(1), n: state.players.length, s: scMe.total.toFixed(2) });
    box.classList.add("end-win"); outcome = "win";
  } else {
    title.textContent = (reason === "pool") ? t("end_pool") : t("end_lose");
    sub.textContent = tf("end_rank_sub", { r: ordinal(myRank+1), n: state.players.length, s: scMe.total.toFixed(2) });
    box.classList.add("end-lose");
  }

  /* classement */
  var rank = qs("end-rank");
  clear(rank);
  rank.appendChild(el("div","rank-title", t("rank_title")));
  var medals = ["🥇","🥈","🥉","4."];
  for (var r=0;r<ranking.length;r++){
    var i = ranking[r];
    var p = state.players[i];
    var sc = finalScore(p);
    var row = el("div","rank-row" + (i === state.myIdx ? " rank-me" : ""));
    row.appendChild(el("span","rank-medal", medals[r] || (r+1)+"."));
    var nm = pName(i) + (p.forfeit ? " 🏳️" : (p.out ? " 💀" : ""));
    row.appendChild(el("span","rank-name", nm));
    var det = el("span","rank-det");
    det.textContent = p.squad.length >= 11
      ? (sc.total.toFixed(2) + (sc.formation ? " · " + tf("compo_ok", { f: sc.formation }) : ""))
      : (p.squad.length + "/11");
    row.appendChild(det);
    rank.appendChild(row);
  }

  var gain = giveCoins(outcome);
  qs("end-coins").textContent = tf("coins_gain", { g: gain, t: store.coins });
  maybeRecordOnline(outcome);
  renderCoins();
  renderAllSquads(qs("end-squads-all"));
  if (outcome === "win") playAnim(store.equipped);
}

var fb = { app:null, db:null, uid:null, ready:false };
var online = {
  ref:null, unsub:null, myIdx:-1, code:null, data:null,
  submittedRound:0, revealShownRound:0, renderedRound:0,
  revealWrittenRound:0, pendingBid:null, hostBusy:false
};

function fbConfigured(){ return FIREBASE_CONFIG.apiKey.indexOf("COLLE") < 0; }

function initFirebase(){
  if (fb.ready) return Promise.resolve(true);
  if (typeof firebase === "undefined" || !fbConfigured()) return Promise.resolve(false);
  try {
    if (!fb.app) fb.app = firebase.initializeApp(FIREBASE_CONFIG);
    fb.db = firebase.firestore();
    return firebase.auth().signInAnonymously().then(function(cred){
      fb.uid = cred.user.uid; fb.ready = true; return true;
    }).catch(function(){ return false; });
  } catch(e){ return Promise.resolve(false); }
}

function myPseudo(){
  if (store.account && store.account.pseudo) return store.account.pseudo;
  return "Joueur" + Math.floor(100 + Math.random()*900);
}
function makeCode(){
  var chars = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  var c = "";
  for (var i=0;i<5;i++) c += chars.charAt(Math.floor(Math.random()*chars.length));
  return c;
}
function hashBid(v, salt){
  var s = String(v) + ":" + salt;
  var h = 5381;
  for (var i=0;i<s.length;i++){ h = ((h << 5) + h + s.charCodeAt(i)) | 0; }
  return String(h);
}
function randomSalt(){
  return Math.random().toString(36).substring(2, 10) + Math.random().toString(36).substring(2, 10);
}
function setOnlineStatus(msg, isError){
  var e = qs("online-status");
  e.textContent = msg || "";
  e.className = "online-status" + (isError ? " online-error" : "");
}

function newDocSide(name, uid){
  return { uid: uid, userKey: (store.account ? store.account.key : null), name: name, budget: 250, squad: [], paid: [], passes: 0, out: false, forfeit: false, boostPending: false, boosted: -1 };
}

function resetOnlineSession(){
  if (online.unsub){ online.unsub(); }
  online.ref = null; online.unsub = null; online.myIdx = -1; online.code = null; online.data = null;
  online.submittedRound = 0; online.revealShownRound = 0; online.renderedRound = 0;
  online.revealWrittenRound = 0; online.pendingBid = null; online.hostBusy = false;
}

function effectiveLeague(){
  return (chosenPlayers > 2) ? "ALL" : chosenLeague;
}

function createPrivateGame(isPublic){
  if (!store.account){ setOnlineStatus(t("acc_need"), true); return; }
  setOnlineStatus(t("st_creating"));
  initFirebase().then(function(ok){
    if (!ok) return setOnlineStatus(t("st_noconfig"), true);
    resetOnlineSession();
    online.code = makeCode();
    online.myIdx = 0;
    online.ref = fb.db.collection("duels").doc(online.code);
    var doc = {
      code: online.code, isPublic: !!isPublic, status: "waiting", createdAt: Date.now(),
      league: isPublic ? "ALL" : effectiveLeague(),
      maxPlayers: isPublic ? 2 : chosenPlayers,
      joined: 1,
      players: { p0: newDocSide(myPseudo(), fb.uid) },
      round: 0, currentIdx: -1, used: [], bids: {},
      leagueCode: (!isPublic && qs("game-league").value) ? qs("game-league").value : null,
      lastResult: null, endReason: null
    };
    online.ref.set(cleanData(doc)).then(function(){
      listenGame();
    }).catch(function(){ setOnlineStatus(t("st_err"), true); });
  });
}

function tryJoin(ref, code){
  return fb.db.runTransaction(function(tx){
    return tx.get(ref).then(function(snap){
      if (!snap.exists) throw new Error("notfound");
      var d = snap.data();
      if (d.status !== "waiting" || d.joined >= d.maxPlayers) throw new Error("full");
      for (var i=0;i<d.joined;i++){
        if (d.players["p" + i] && d.players["p" + i].uid === fb.uid) throw new Error("self");
      }
      var slot = d.joined;
      var u = { joined: slot + 1 };
      u["players.p" + slot] = newDocSide(myPseudo(), fb.uid);
      if (slot + 1 >= d.maxPlayers) u.status = "playing";
      tx.update(ref, cleanData(u));
      return slot;
    });
  });
}

function joinPrivateGame(){
  if (!store.account){ setOnlineStatus(t("acc_need"), true); return; }
  var code = qs("join-code-input").value.trim().toUpperCase();
  if (code.length !== 5){ setOnlineStatus(t("st_badcode"), true); return; }
  setOnlineStatus(tf("st_joining", { c: code }));
  initFirebase().then(function(ok){
    if (!ok) return setOnlineStatus(t("st_noconfig"), true);
    resetOnlineSession();
    var ref = fb.db.collection("duels").doc(code);
    tryJoin(ref, code).then(function(slot){
      online.code = code; online.myIdx = slot; online.ref = ref;
      listenGame();
    }).catch(function(err){
      if (err && err.message === "notfound") setOnlineStatus(t("st_notfound"), true);
      else if (err && err.message === "full") setOnlineStatus(t("st_full"), true);
      else if (err && err.message === "self") setOnlineStatus(t("st_self"), true);
      else setOnlineStatus(t("st_err"), true);
    });
  });
}

function findRandomGame(){
  if (!store.account){ setOnlineStatus(t("acc_need"), true); return; }
  setOnlineStatus(t("st_searching"));
  initFirebase().then(function(ok){
    if (!ok) return setOnlineStatus(t("st_noconfig"), true);
    fb.db.collection("duels")
      .where("isPublic", "==", true)
      .where("status", "==", "waiting")
      .limit(5).get()
      .then(function(qsnap){
        var candidate = null;
        var now = Date.now();
        qsnap.forEach(function(docSnap){
          var d = docSnap.data();
          if (candidate) return;
          if (d.players && d.players.p0 && d.players.p0.uid === fb.uid) return;
          if (now - d.createdAt > 5 * 60 * 1000) return;
          candidate = docSnap.id;
        });
        if (!candidate){ createPrivateGame(true); return; }
        resetOnlineSession();
        var ref = fb.db.collection("duels").doc(candidate);
        tryJoin(ref, candidate).then(function(slot){
          online.code = candidate; online.myIdx = slot; online.ref = ref;
          listenGame();
        }).catch(function(){ createPrivateGame(true); });
      })
      .catch(function(){ setOnlineStatus(t("st_err"), true); });
  });
}

function cancelWaiting(){

function listenGame(){
  MODE = "online";
  rewardGiven = false;
  endShownLocal = false;
  statsRecorded = false;
  usedBonus = { time:false, cash:false, star:false };
  online.unsub = online.ref.onSnapshot(onGameUpdate, function(){
    setOnlineStatus(t("st_lost"), true);
  });
}

function docPlayersArr(d){
  var arr = [];
  for (var i=0;i<d.maxPlayers;i++){
    var p = d.players["p" + i];
    if (p) arr.push(p);
  }
  return arr;
}
function needsBid(p){ return !p.out && p.squad.length < 11; }
function allNeededCommitted(d, arr){
  for (var i=0;i<arr.length;i++){
    if (!needsBid(arr[i])) continue;
    var b = d.bids && d.bids["b" + i];
    if (!b || !b.hash) return false;
  }
  return true;
}
function allNeededRevealed(d, arr){
  for (var i=0;i<arr.length;i++){
    if (!needsBid(arr[i])) continue;
    var b = d.bids && d.bids["b" + i];
    if (!b || typeof b.value !== "number") return false;
  }
  return true;
}

function syncOnlineToState(d){
  var arr = docPlayersArr(d);
  state = {
    players: arr, myIdx: online.myIdx,
    round: d.round, current: d.currentIdx, used: d.used || [],
    league: d.league || "ALL", profile: null, endReason: d.endReason || null
  };
}

function onGameUpdate(snap){
  if (!snap.exists){
    if (MODE === "online" && !endShownLocal){
      resetOnlineSession();
      MODE = "solo";
      hideAllScreens();
      show("screen-online");
      setOnlineStatus(t("st_cancelled"), true);
    }
    return;
  }
  var d = snap.data();
  online.data = d;
  var arr = docPlayersArr(d);

  /* devoirs de l'hote (p0) */
  if (online.myIdx === 0 && d.status === "playing"){
    if (d.round === 0 && !online.hostBusy){
      online.hostBusy = true;
      hostStartFirstRound(d);
      return;
    }
    /* fin anticipee : un seul joueur actif restant */
    var activeCount = 0;
    for (var a=0;a<arr.length;a++) if (!arr[a].out) activeCount++;
    if (activeCount <= 1 && d.round > 0 && !online.hostBusy){
      hostFinish(d);
      return;
    }
    if (d.round > 0 && allNeededRevealed(d, arr) && allNeededCommitted(d, arr) && !(d.lastResult && d.lastResult.round === d.round)){
      hostResolve(d);
    }
  }

  /* reveler ma mise quand tous les hashes attendus sont la */
  if (d.status === "playing" && d.round > 0 && allNeededCommitted(d, arr) && online.revealWrittenRound < d.round){
    var mine = d.bids && d.bids["b" + online.myIdx];
    if (mine && mine.hash && typeof mine.value !== "number"){
      online.revealWrittenRound = d.round;
      var pb = online.pendingBid || { v: 0, salt: "" };
      var u = {};
      u["bids.b" + online.myIdx + ".value"] = pb.v;
      u["bids.b" + online.myIdx + ".salt"] = pb.salt;
      online.ref.update(u).catch(function(){ online.revealWrittenRound = 0; });
    }
  }

  if (d.status === "waiting"){
    hideAllScreens();
    show("screen-wait");
    qs("wait-code").textContent = online.code;
    qs("wait-players").textContent = tf("wait_players", { a: d.joined, b: d.maxPlayers });
    qs("wait-msg").textContent = d.isPublic ? t("wait_random_msg") : t("wait_share");
    qs("btn-wait-cancel").classList.toggle("hidden", online.myIdx !== 0);
    return;
  }

  syncOnlineToState(d);

  if (d.lastResult && d.lastResult.round > online.revealShownRound){
    showOnlineReveal(d);
    return;
  }
  if (d.status === "finished"){
    showOnlineEnd(d);
    return;
  }
  if (d.round > 0){
    if (qs("screen-game").classList.contains("hidden")){
      hideAllScreens();
      show("screen-game");
      show("btn-abandon");
    }
    if (me().out || me().squad.length >= 11){
      if (online.renderedRound !== d.round){
        online.renderedRound = d.round;
        renderRound();
      }
    } else if (online.submittedRound >= d.round){
      showWaitingBidState();
    } else if (online.renderedRound !== d.round){
      online.renderedRound = d.round;
      renderRound();
    }
  }
}

function hostStartFirstRound(d){
  var idx = weightedPick(availableIdxs(d.league || "ALL", []));
  online.ref.update(cleanData({ round: 1, currentIdx: idx, used: [idx] }))
    .then(function(){ online.hostBusy = false; })
    .catch(function(){ online.hostBusy = false; });
}

function hostFinish(d){
  online.hostBusy = true;
  var ref = online.ref;
  var logCapture = null;
  fb.db.runTransaction(function(tx){
    return tx.get(ref).then(function(snap){
      if (!snap.exists) return;
      var dd = snap.data();
      if (dd.status !== "playing") return;
      tx.update(ref, cleanData({ status: "finished", endReason: dd.endReason || "forfeit" }));
      logCapture = { dd: dd };
    });
  }).then(function(){
    online.hostBusy = false;
    if (logCapture){
      var arr = docPlayersArr(logCapture.dd);
      var mode = logCapture.dd.isPublic ? "online-public" : (logCapture.dd.leagueCode ? "league" : "online-private");
      writeMatchLog({
        mode: mode, playersCount: arr.length, players: playerLogEntries(arr),
        winnerPseudo: winnerPseudoFromRanking(arr, "forfeit"),
        league: logCapture.dd.league, leagueCode: logCapture.dd.leagueCode || null
      });
    }
  }).catch(function(){ online.hostBusy = false; });
}

function hostResolve(d){
  if (online.hostBusy) return;
  online.hostBusy = true;
  var ref = online.ref;
  var logCapture = null;
  fb.db.runTransaction(function(tx){
    return tx.get(ref).then(function(snap){
      if (!snap.exists) return;
      var dd = snap.data();
      if (dd.status !== "playing") return;
      var arr = docPlayersArr(dd);
      if (!allNeededCommitted(dd, arr) || !allNeededRevealed(dd, arr)) return;
      if (dd.lastResult && dd.lastResult.round === dd.round) return;

      var n = arr.length, i;
      var vals = [];
      for (i=0;i<n;i++){
        if (!needsBid(arr[i])){ vals.push(null); continue; }
        var b = dd.bids["b" + i];
        var v = (hashBid(b.value, b.salt || "") === b.hash) ? b.value : 0;
        if (v < 0) v = 0;
        if (v > arr[i].budget) v = arr[i].budget;
        /* 5 passes max : mise forcee */
        if (v === 0 && (arr[i].passes || 0) >= MAX_PASSES && arr[i].budget >= 1) v = 1;
        vals.push(v);
      }

      /* meilleur mise unique en tete */
      var best = -1, bestIdx = -1, tie = false, anyBid = false;
      for (i=0;i<n;i++){
        if (vals[i] === null) continue;
        if (vals[i] > 0) anyBid = true;
        if (vals[i] > best){ best = vals[i]; bestIdx = i; tie = false; }
        else if (vals[i] === best && best > 0){ tie = true; }
      }
      var kind, winnerIdx = -1;
      if (!anyBid) kind = "none";
      else if (tie) kind = "tie";
      else { kind = "win"; winnerIdx = bestIdx; }

      var upd = { bids: {} };
      var newPlayers = [];
      for (i=0;i<n;i++){
        var p = arr[i];
        var np = {
          uid: p.uid, name: p.name, budget: p.budget,
          squad: p.squad.slice(), paid: p.paid.slice(),
          passes: p.passes || 0, out: !!p.out, forfeit: !!p.forfeit,
          boostPending: !!p.boostPending, boosted: (typeof p.boosted === "number") ? p.boosted : -1
        };
        if (vals[i] === 0 && p.squad.length < 11 && !p.out) np.passes = (p.passes || 0) + 1;
        if (kind === "win" && i === winnerIdx){
          np.budget -= vals[i];
          np.squad.push(dd.currentIdx);
          np.paid.push(vals[i]);
          if (np.boostPending){ np.boosted = dd.currentIdx; np.boostPending = false; }
        }
        newPlayers.push(np);
      }
      /* eliminations */
      for (i=0;i<n;i++){
        var need = 11 - newPlayers[i].squad.length;
        if (!newPlayers[i].out && need > 0 && newPlayers[i].budget < need) newPlayers[i].out = true;
      }
      for (i=0;i<n;i++) upd["players.p" + i] = newPlayers[i];

      var bidsPublic = [];
      for (i=0;i<n;i++) bidsPublic.push(vals[i]);
      upd.lastResult = { round: dd.round, playerIdx: dd.currentIdx, bids: bidsPublic, winner: winnerIdx, kind: kind };

      /* fin de partie ? */
      var active = 0, allFull = true, anyOut = false;
      for (i=0;i<n;i++){
        if (!newPlayers[i].out){
          active++;
          if (newPlayers[i].squad.length < 11) allFull = false;
        } else anyOut = true;
      }
      var avail = availableIdxs(dd.league || "ALL", dd.used);
      var finished = false, endReason = null;
      if (active === 0){ finished = true; endReason = "double"; }
      else if (active === 1 && n > 1 && anyOut){ finished = true; endReason = "elim"; }
      else if (allFull){ finished = true; endReason = "score"; }
      else if (avail.length === 0){ finished = true; endReason = "pool"; }

      if (finished){
        upd.status = "finished";
        upd.endReason = endReason;
        var mode = dd.isPublic ? "online-public" : (dd.leagueCode ? "league" : "online-private");
        logCapture = {
          mode: mode, playersCount: newPlayers.length, players: playerLogEntries(newPlayers),
          winnerPseudo: winnerPseudoFromRanking(newPlayers, endReason),
          league: dd.league, leagueCode: dd.leagueCode || null
        };
      } else {
        var nextIdx = weightedPick(avail);
        var newUsed = dd.used.slice();
        newUsed.push(nextIdx);
        upd.round = dd.round + 1;
        upd.currentIdx = nextIdx;
        upd.used = newUsed;
      }
      tx.update(ref, cleanData(upd));
    });
  }).then(function(){
    online.hostBusy = false;
    if (logCapture) writeMatchLog(logCapture);
  }).catch(function(){ online.hostBusy = false; });
}

function submitOnlineBid(v){
  var d = online.data;
  if (!d || d.status !== "playing" || d.round === 0) return;
  if (online.submittedRound >= d.round) return;
  online.submittedRound = d.round;
  stopTimer();

  if (isNaN(v) || v < 0) v = 0;
  if (v < minBidYou()) v = minBidYou();
  var myBudget = state.players[online.myIdx].budget;
  if (v > myBudget) v = myBudget;

  var salt = randomSalt();
  online.pendingBid = { v: v, salt: salt };
  var u = {};
  u["bids.b" + online.myIdx] = { hash: hashBid(v, salt) };
  online.ref.update(u).then(function(){
    showWaitingBidState();
  }).catch(function(){
    online.submittedRound = 0;
    setOnlineStatus(t("st_err"), true);
  });
}

function showWaitingBidState(){
  var d = online.data;
  var p = PLAYERS[d.currentIdx];
  show("overlay-reveal");
  setRevealWaiting(true);
  qs("rv-title").textContent = t("rv_title");
  qs("rv-player").textContent = p[0] + " (" + p[2] + ")";
}

function showOnlineReveal(d){
  stopTimer();
  var lr = d.lastResult;
  online.revealShownRound = lr.round;
  if (qs("screen-game").classList.contains("hidden")){
    hideAllScreens();
    show("screen-game");
    show("btn-abandon");
  }
  renderReveal(lr.playerIdx, lr.bids, lr.winner, lr.kind);
}

function onlineNextRound(){
  hide("overlay-reveal");
  var d = online.data;
  if (!d) return;
  syncOnlineToState(d);
  if (d.status === "finished"){
    showOnlineEnd(d);
    return;
  }
  if (me().out || me().squad.length >= 11){
    online.renderedRound = d.round;
    renderRound();
  } else if (online.submittedRound >= d.round){
    showWaitingBidState();
  } else if (d.round > 0){
    online.renderedRound = d.round;
    renderRound();
  }
}

function showOnlineEnd(d){
  if (endShownLocal) return;
  endShownLocal = true;
  stopTimer();
  syncOnlineToState(d);
  hideAllScreens();
  show("screen-end");
  renderEnd(d.endReason || "score");
}

function abandonGame(){
  var sure = window.confirm(t("confirm_abandon"));
  if (!sure) return;
  if (MODE === "solo"){
    if (!state || state.endReason !== null) return;
    stopTimer();
    me().out = true; me().forfeit = true;
    endGame("forfeit");
    return;
  }
  if (MODE !== "online" || !online.ref || !online.data) return;
  if (online.data.status !== "playing") return;
  var u = {};
  u["players.p" + online.myIdx + ".out"] = true;
  u["players.p" + online.myIdx + ".forfeit"] = true;
  online.ref.update(u).then(function(){
    /* fin locale immediate pour moi */
    syncOnlineToState(online.data);
    me().out = true; me().forfeit = true;
    endShownLocal = true;
    stopTimer();
    hideAllScreens();
    show("screen-end");
    renderEnd("forfeit");
  }).catch(function(){});
}

function leaveOnline(){
  resetOnlineSession();
  MODE = "solo";
}

function pseudoKey(pseudo){

function sanitizeField(name){

function recordOnlineGame(outcome){
  if (MODE !== "online" || !online.data || !state.players) return;
  var opponent = null, opponentKey = null;
  for (var i=0;i<state.players.length;i++){
    if (i !== state.myIdx && state.players[i] && state.players[i].userKey){
      opponent = state.players[i]; opponentKey = opponent.userKey; break;
    }
  }
  if (opponent && opponentKey) recordGameHistory(opponentKey, opponent.name, outcome, state.players.length);
}
function maybeRecordOnline(outcome){
  recordOnlineGame(outcome);
  if (MODE !== "online" || !store.account || statsRecorded || !online.data) return;
  statsRecorded = true;
  var d = online.data;
  var mySide = state.players[state.myIdx];
  if (d.isPublic){
    recordGlobalStats(outcome, mySide);
  } else if (d.leagueCode){
    recordLeagueGame(d.leagueCode, outcome);
  }
}
function recordGlobalStats(outcome, side){
  initFirebase().then(function(ok){
    if (!ok) return;
    var ref = myUserRef();
    fb.db.runTransaction(function(tx){
      return tx.get(ref).then(function(snap){
        if (!snap.exists) return;
        var fullData = snap.data();
        var st = fullData.stats || zeroStats();
        st.games = (st.games || 0) + 1;
        if (outcome === "win"){
          st.wins = (st.wins || 0) + 1;
          st.streak = (st.streak || 0) + 1;
          if (st.streak > (st.bestStreak || 0)) st.bestStreak = st.streak;
        } else if (outcome === "tie"){
          st.ties = (st.ties || 0) + 1;
        } else {
          st.losses = (st.losses || 0) + 1;
          st.streak = 0;
        }
        var i, spent = 0;
        for (i=0;i<side.paid.length;i++){
          spent += side.paid[i];
          if (side.paid[i] > (st.biggestBid || 0)) st.biggestBid = side.paid[i];
        }
        st.totalSpent = (st.totalSpent || 0) + spent;
        if (!st.buys) st.buys = {};
        for (i=0;i<side.squad.length;i++){
          var nm = sanitizeField(PLAYERS[side.squad[i]][0]);
          if (!st.buys[nm]) st.buys[nm] = { n:0, spent:0 };
          st.buys[nm].n += 1;
          st.buys[nm].spent += side.paid[i];
        }
        var updates = { stats: st };
        applyEloForGame(outcome, ref, tx, fullData, updates);
        tx.update(ref, cleanData(updates));
      });
    }).catch(function(){});
  });
}
function recordLeagueGame(code, outcome){
  initFirebase().then(function(ok){
    if (!ok) return;
    var ref = fb.db.collection("leagues").doc(code);
    ref.get().then(function(snap){
      if (!snap.exists) return;
      var d = snap.data();
      if (!d.members || !d.members[store.account.key]) return;
      var u = {};
      u["standings." + store.account.key + ".pseudo"] = store.account.pseudo;
      u["standings." + store.account.key + ".games"] = firebase.firestore.FieldValue.increment(1);
      u["standings." + store.account.key + ".wins"] = firebase.firestore.FieldValue.increment(outcome === "win" ? 1 : 0);
      ref.update(u).catch(function(){});
    }).catch(function(){});
  });
}

  clear(box);
  if (!users.length){

  }
  users.sort(function(a,b){
    var wa = (a.stats && a.stats.wins) || 0, wb = (b.stats && b.stats.wins) || 0;
    if (wa !== wb) return wb - wa;
    var ga = (a.stats && a.stats.games) || 0, gb = (b.stats && b.stats.games) || 0;

  });

      }).catch(function(){ clear(box); box.appendChild(el("div","rk-empty", t("st_err"))); });

      var c = store.account ? store.account.country : "FR";
      fb.db.collection("users").where("country","==",c).limit(200).get().then(function(qsnap){
        var arr = [];
        qsnap.forEach(function(s){ var d = s.data(); d.key = s.id; arr.push(d); });
        renderRankList(arr);
      }).catch(function(){ clear(box); box.appendChild(el("div","rk-empty", t("st_err"))); });

      if (!store.account){ clear(box); box.appendChild(el("div","rk-empty", t("acc_need"))); return; }
      myUserRef().get().then(function(snap){
        var codes = (snap.exists && snap.data().leagues) || [];
        if (!codes.length){ clear(box); box.appendChild(el("div","rk-empty", t("lg_none"))); return; }
        var gets = [];
        for (var i=0;i<codes.length && i<10;i++) gets.push(fb.db.collection("leagues").doc(codes[i]).get());
        Promise.all(gets).then(function(snaps){
          var keys = {}, list = [];
          for (var j=0;j<snaps.length;j++){
            if (!snaps[j].exists) continue;
            var mem = snaps[j].data().members || {};
            for (var k in mem){ if (!keys[k]){ keys[k] = true; list.push(k); } }
          }
          if (!list.length){ clear(box); box.appendChild(el("div","rk-empty", t("rk_empty"))); return; }
          var chunks = [];
          for (var c2=0;c2<list.length && c2<100;c2+=10) chunks.push(list.slice(c2, c2+10));
          var gets2 = [];
          for (var c3=0;c3<chunks.length;c3++){
            gets2.push(fb.db.collection("users").where(firebase.firestore.FieldPath.documentId(),"in",chunks[c3]).get());
          }
          Promise.all(gets2).then(function(qsnaps){
            var arr = [];
            for (var q=0;q<qsnaps.length;q++){
              qsnaps[q].forEach(function(s){ var d = s.data(); d.key = s.id; arr.push(d); });
            }
            renderRankList(arr);
          }).catch(function(){ clear(box); box.appendChild(el("div","rk-empty", t("st_err"))); });
        });
      }).catch(function(){ clear(box); box.appendChild(el("div","rk-empty", t("st_err"))); });
    }
  });
}

function leagueStandingsArr(d){
  var arr = [];
  for (var k in (d.standings || {})){
    var s = d.standings[k];
    arr.push({ key: k, pseudo: s.pseudo || k, wins: s.wins || 0, games: s.games || 0 });
  }
  arr.sort(function(a,b){
    if (a.wins !== b.wins) return b.wins - a.wins;
    if (a.games !== b.games) return a.games - b.games;
    return a.pseudo < b.pseudo ? -1 : 1;
  });
  return arr;
}

function closeSeason(code){
  if (!window.confirm(t("lg_close_confirm"))) return;
  var ref = fb.db.collection("leagues").doc(code);
  var championKey = null, championPseudo = null;
  fb.db.runTransaction(function(tx){
    return tx.get(ref).then(function(snap){
      if (!snap.exists) return;
      var d = snap.data();
      var arr = leagueStandingsArr(d);
      if (!arr.length) throw new Error("empty");
      championKey = arr[0].key;
      championPseudo = arr[0].pseudo;
      var top = [];
      for (var i=0;i<arr.length && i<10;i++) top.push({ pseudo: arr[i].pseudo, wins: arr[i].wins, games: arr[i].games });
      var hist = (d.history || []).slice();
      hist.push({ season: d.season, closedAt: Date.now(), championKey: championKey, championPseudo: championPseudo, top: top });
      tx.update(ref, cleanData({ season: d.season + 1, standings: {}, history: hist }));

var friendsModule = {
  pendingRequests: [],    /* [{senderKey, senderPseudo}, ...] */
  friendsList: [],        /* [key, ...] */
  historyWith: null,      /* current friend viewed */
  unreadCount: 0
};

function initFriendsSystem(){
  if (!store.account) return;
  loadFriendsData();
}

function loadFriendsData(){
  initFirebase().then(function(ok){
    if (!ok || !store.account) return;
    myUserRef().get().then(function(snap){
      if (!snap.exists) return;
      var d = snap.data();
      friendsModule.friendsList = (d.friends || []);
      friendsModule.pendingRequests = [];
      var reqs = (d.friendRequests || {});
      for (var k in reqs){
        friendsModule.pendingRequests.push({
          senderKey: k,
          senderPseudo: reqs[k].pseudo,
          timestamp: reqs[k].timestamp
        });
      }
      friendsModule.unreadCount = friendsModule.pendingRequests.length;
      updateFriendsNotification();
    });
  });
}

function updateFriendsNotification(){
  var badge = document.querySelector(".friends-badge");
  if (badge){
    if (friendsModule.unreadCount > 0){
      badge.textContent = friendsModule.unreadCount;
      badge.classList.remove("hidden");
    } else {
      badge.classList.add("hidden");
    }
  }
}

function sendFriendRequest(targetKey, targetPseudo){
  if (!store.account) return;
  if (friendsModule.friendsList.indexOf(targetKey) >= 0){
    window.alert(t("already_friend"));
    return;
  }
  var hasRequest = friendsModule.pendingRequests.some(function(r){ return r.senderKey === targetKey; });
  if (hasRequest){
    window.alert(t("request_pending"));
    return;
  }
  if (targetKey === store.account.key){
    window.alert(t("cant_add_yourself"));
    return;
  }
  initFirebase().then(function(ok){
    if (!ok) return;
    var targetRef = fb.db.collection("users").doc(targetKey);
    targetRef.update({
      ["friendRequests." + store.account.key]: {
        pseudo: store.account.pseudo,
        timestamp: Date.now()
      }
    }).then(function(){
      window.alert(t("request_sent"));
      loadFriendsData();
    }).catch(function(){
      window.alert(t("st_err"));
    });
  });
}

function acceptFriendRequest(senderKey, senderPseudo){
  if (!store.account) return;
  initFirebase().then(function(ok){
    if (!ok) return;
    var myRef = myUserRef();
    var theirRef = fb.db.collection("users").doc(senderKey);
    var myUpdate = {
      friends: firebase.firestore.FieldValue.arrayUnion(senderKey)
    };
    myUpdate["friendRequests." + senderKey] = firebase.firestore.FieldValue.delete();
    Promise.all([
      myRef.update(myUpdate),
      theirRef.update({ friends: firebase.firestore.FieldValue.arrayUnion(store.account.key) })
    ]).then(function(){
      loadFriendsData();
      if (!qs("screen-friends-requests").classList.contains("hidden")) renderFriendsRequests();
    }).catch(function(){
      window.alert(t("st_err"));
    });
  });
}

function rejectFriendRequest(senderKey){
  if (!store.account) return;
  var myRef = myUserRef();
  var u = {};
  u["friendRequests." + senderKey] = firebase.firestore.FieldValue.delete();
  myRef.update(u).then(function(){
    loadFriendsData();
    if (!qs("screen-friends-requests").classList.contains("hidden")) renderFriendsRequests();
  }).catch(function(){
    window.alert(t("st_err"));
  });
}

/* =========================================================
   V8 : SAISONS MONDIALES, ELO, DUELGOLD, THEME GENESIS
   ========================================================= */

var SEASON_ACTIVE_DAYS = 90;
var SEASON_PAUSE_DAYS = 3;
var SEASON_ACTIVE_MS = SEASON_ACTIVE_DAYS * 24 * 60 * 60 * 1000;
var SEASON_CYCLE_MS = (SEASON_ACTIVE_DAYS + SEASON_PAUSE_DAYS) * 24 * 60 * 60 * 1000;

var ELO_TIERS = [
  { id:"district", min:0, max:300 },
  { id:"regional", min:301, max:800 },
  { id:"national", min:801, max:1500 },
  { id:"continental", min:1501, max:3000 },
  { id:"mondial", min:3001, max:Infinity }
];
var TIER_REWARDS = { district:100, regional:250, national:500, continental:1000, mondial:2000 };

/* thèmes définis par saison. Saison 1 = Genesis (validé). Saisons futures : à ajouter ici au fur et à mesure. */
var SEASON_THEMES = {
  1: { id:"genesis", titleKey:"season1_title" }
};

var seasonConfig = null;   /* contenu brut du doc Firestore config/seasons */
var seasonState = null;    /* état calculé : {phase, seasonNumber, msToStart|msToEnd|msToNext} */
var seasonTickerId = null;
var seasonClaimChecked = false;

function eloTier(elo){
  for (var i=0;i<ELO_TIERS.length;i++){
    if (elo >= ELO_TIERS[i].min && elo <= ELO_TIERS[i].max) return ELO_TIERS[i].id;
  }
  return "district";
}
function getSeasonThemeId(seasonNumber){
  var conf = SEASON_THEMES[seasonNumber];
  return conf ? conf.id : "default";
}
function seasonTitle(seasonNumber){
  var conf = SEASON_THEMES[seasonNumber];
  if (conf) return t(conf.titleKey);
  return tf("season_generic_title", { n: seasonNumber });
}

function computeSeasonState(){
  if (!seasonConfig || !seasonConfig.startDate){
    seasonState = { phase:"idle" };
    return;
  }
  var start = new Date(seasonConfig.startDate).getTime();
  var now = Date.now();
  if (isNaN(start)){
    seasonState = { phase:"idle" };
    return;
  }
  if (now < start){
    seasonState = { phase:"before", seasonNumber:1, msToStart: start - now };
    return;
  }
  var elapsed = now - start;
  var cycleIndex = Math.floor(elapsed / SEASON_CYCLE_MS);
  var seasonNumber = cycleIndex + 1;
  var posInCycle = elapsed - cycleIndex * SEASON_CYCLE_MS;
  if (posInCycle < SEASON_ACTIVE_MS){
    seasonState = { phase:"active", seasonNumber:seasonNumber, msToEnd: SEASON_ACTIVE_MS - posInCycle };
  } else {
    seasonState = { phase:"pause", seasonNumber:seasonNumber, nextSeasonNumber:seasonNumber+1, msToNext: SEASON_CYCLE_MS - posInCycle };
  }
}

function loadSeasonConfig(){
  initFirebase().then(function(ok){
    if (!ok) return;
    fb.db.collection("config").doc("seasons").get().then(function(snap){
      seasonConfig = snap.exists ? snap.data() : null;
      computeSeasonState();
      applySeasonTheme();
      renderSeasonBanner();
      maybeClaimSeasonRewards();
      startSeasonTicker();
    }).catch(function(){
      seasonConfig = null;
      seasonState = { phase:"idle" };
      renderSeasonBanner();
    });
  });
}

function startSeasonTicker(){
  if (seasonTickerId) clearInterval(seasonTickerId);
  seasonTickerId = setInterval(function(){
    var prevPhase = seasonState ? seasonState.phase : null;
    var prevNum = seasonState ? seasonState.seasonNumber : null;
    computeSeasonState();
    renderSeasonBanner();
    if (seasonState && (seasonState.phase !== prevPhase || seasonState.seasonNumber !== prevNum)){
      applySeasonTheme();
      maybeClaimSeasonRewards();
    }
  }, 1000);
}

function fmtCountdown(ms){
  if (ms < 0) ms = 0;
  var s = Math.floor(ms / 1000);
  var d = Math.floor(s / 86400); s -= d * 86400;
  var h = Math.floor(s / 3600); s -= h * 3600;
  var m = Math.floor(s / 60); s -= m * 60;
  return { d:d, h:h, m:m, s:s };
}

function renderSeasonBanner(){
  var box = qs("season-banner");
  if (!box) return;
  if (!seasonState || seasonState.phase === "idle"){
    box.classList.add("hidden");
    return;
  }
  box.classList.remove("hidden");
  var titleEl = qs("season-banner-title");
  var subEl = qs("season-banner-sub");
  var cd;
  if (seasonState.phase === "before"){
    titleEl.textContent = seasonTitle(1);
    subEl.textContent = t("season_starts_in");
    cd = fmtCountdown(seasonState.msToStart);
  } else if (seasonState.phase === "active"){
    titleEl.textContent = seasonTitle(seasonState.seasonNumber);
    subEl.textContent = t("season_ends_in");
    cd = fmtCountdown(seasonState.msToEnd);
  } else {
    titleEl.textContent = tf("season_next_title", { n: seasonState.nextSeasonNumber });
    subEl.textContent = t("season_pause_msg");
    cd = fmtCountdown(seasonState.msToNext);
  }
  qs("cd-d").textContent = String(cd.d).padStart(2,"0");
  qs("cd-h").textContent = String(cd.h).padStart(2,"0");
  qs("cd-m").textContent = String(cd.m).padStart(2,"0");
  qs("cd-s").textContent = String(cd.s).padStart(2,"0");
}

/* ---------- CLAIM DES RECOMPENSES DE FIN DE SAISON ---------- */
function maybeClaimSeasonRewards(){
  if (!store.account || !seasonState || seasonClaimChecked) return;
  if (seasonState.phase === "idle" || seasonState.phase === "before") return;
  var currentSeasonNumber = seasonState.seasonNumber;
  seasonClaimChecked = true;
  initFirebase().then(function(ok){
    if (!ok){ seasonClaimChecked = false; return; }
    var ref = myUserRef();
    ref.get().then(function(snap){
      if (!snap.exists) return;
      var d = snap.data();
      var userSeasonNum = d.seasonNumber || 0;
      if (userSeasonNum >= currentSeasonNumber) return;
      var oldElo = d.elo || 0;
      var closedSeasonNumber = userSeasonNum > 0 ? userSeasonNum : currentSeasonNumber;
      if (oldElo <= 0){
        /* rien à réclamer, juste avancer le compteur de saison */
        ref.update({ seasonNumber: currentSeasonNumber, elo: 0 }).catch(function(){});
        return;
      }
      var tier = eloTier(oldElo);
      var reward = TIER_REWARDS[tier] || 0;
      finalizeTop50Bonus(oldElo, tier, function(bonus, rank){
        var totalReward = reward + bonus;
        var histEntry = {
          season: closedSeasonNumber, title: seasonTitle(closedSeasonNumber),
          tier: tier, elo: oldElo, duelGoldEarned: totalReward,
          rankMondial: rank || null, closedAt: Date.now()
        };
        var updates = {
          elo: 0, seasonNumber: currentSeasonNumber,
          duelgold: firebase.firestore.FieldValue.increment(totalReward),
          seasonHistory: firebase.firestore.FieldValue.arrayUnion(histEntry)
        };
        if (rank && rank <= 50){
          updates["badges.mondialTop50"] = firebase.firestore.FieldValue.arrayUnion(closedSeasonNumber);
        }
        if (rank && rank <= 3){
          var u2 = {};
          u2["badges.mondialTop3." + closedSeasonNumber] = rank;
          updates["badges.mondialTop3"] = Object.assign({}, d.badges && d.badges.mondialTop3 ? d.badges.mondialTop3 : {});
          updates["badges.mondialTop3"][closedSeasonNumber] = rank;
        }
        ref.update(cleanData(updates)).then(function(){
          store.duelgold = (store.duelgold || 0) + totalReward;
          saveStore(store);
          showSeasonRewardPopup(histEntry);
        }).catch(function(){});
      });
    });
  });
}

function finalizeTop50Bonus(elo, tier, callback){
  if (tier !== "mondial"){ callback(0, null); return; }
  fb.db.collection("users").where("elo", ">=", 3000).orderBy("elo","desc").limit(50).get()
    .then(function(qsnap){
      var rank = null, idx = 0;
      qsnap.forEach(function(doc){
        idx++;
        if (doc.id === store.account.key) rank = idx;
      });
      var bonus = 0;
      if (rank === 1) bonus = 3000;
      else if (rank === 2) bonus = 2000;
      else if (rank === 3) bonus = 1000;
      else if (rank && rank <= 10) bonus = 500;
      else if (rank && rank <= 50) bonus = 200;
      callback(bonus, rank);
    }).catch(function(){ callback(0, null); });
}

function applyEloForGame(outcome, ref, tx, data, updates){
  if (!seasonState || seasonState.phase !== "active") return;
  var currentSeasonNumber = seasonState.seasonNumber;
  var userSeasonNum = data.seasonNumber || 0;
  var baseElo = (userSeasonNum >= currentSeasonNumber) ? (data.elo || 0) : 0;
  var delta = 0;
  if (outcome === "win") delta = 30;
  else if (outcome === "loss" || outcome === "lose") delta = -10;
  var newElo = baseElo + delta;
  if (newElo < 0) newElo = 0;
  updates.elo = newElo;
  updates.seasonNumber = currentSeasonNumber;
}

/* ---------- AFFICHAGE PROFIL : ELO + HISTORIQUE + BADGES ---------- */
function renderSeasonProfileSection(data){
  var box = qs("pf-season-section");
  if (!box) return;
  clear(box);
  var elo = data.elo || 0;
  var tier = eloTier(elo);
  var showElo = seasonState && (seasonState.phase === "active" || seasonState.phase === "pause");

  if (showElo){
    var eloCard = el("div","season-elo-card season-tier-" + tier);
    eloCard.appendChild(el("div","season-elo-value", String(elo)));
    eloCard.appendChild(el("div","season-elo-tier", t("tier_" + tier)));
    box.appendChild(eloCard);
  }

  var badges = data.badges || {};
  var top50List = badges.mondialTop50 || [];
  var top3Map = badges.mondialTop3 || {};
  if (top50List.length){
    var badgeRow = el("div","badge-row");
    for (var i=0;i<top50List.length;i++){
      var seasonNum = top50List[i];
      var rank = top3Map[seasonNum];
      var cls = "badge-chip";
      var label = "🏵 S" + seasonNum;
      if (rank === 1){ cls += " badge-gold"; label = "🥇 S" + seasonNum; }
      else if (rank === 2){ cls += " badge-silver"; label = "🥈 S" + seasonNum; }
      else if (rank === 3){ cls += " badge-bronze"; label = "🥉 S" + seasonNum; }
      badgeRow.appendChild(el("span", cls, label));
    }
    box.appendChild(badgeRow);
  }

  var history = data.seasonHistory || [];
  if (history.length){
    box.appendChild(el("div","shop-section", t("season_history_title")));
    var sorted = history.slice().sort(function(a,b){ return b.season - a.season; });
    for (var j=0;j<sorted.length;j++){
      var hEntry = sorted[j];
      var row = el("div","season-hist-row");
      row.appendChild(el("span","season-hist-title", hEntry.title));
      row.appendChild(el("span","season-hist-tier", t("tier_" + hEntry.tier)));
      row.appendChild(el("span","season-hist-gold", "+" + hEntry.duelGoldEarned + " 👑"));
      box.appendChild(row);
    }
  }
}

var ADMIN_UID = "rB6wgA6QWDT8L7iGTAZC6uzNMt52";
var arrivalSource = null;

function computeArrivalSource(){
  try {
    var ref = document.referrer || "";
    if (!ref) { arrivalSource = "direct"; return; }
    var host = "";
    try { host = new URL(ref).hostname.toLowerCase(); } catch(e){ host = ""; }
    if (host.indexOf("elevenduel.com") >= 0 || host.indexOf("github.io") >= 0){ arrivalSource = "direct"; return; }
    if (host.indexOf("t.co") >= 0 || host.indexOf("twitter.com") >= 0 || host.indexOf("x.com") >= 0){ arrivalSource = "twitter"; return; }
    if (host.indexOf("whatsapp") >= 0){ arrivalSource = "whatsapp"; return; }
    arrivalSource = "other:" + (host || "unknown");
  } catch(e){ arrivalSource = "direct"; }
}

function writeMatchLog(entry){

    entry.timestamp = Date.now();
    fb.db.collection("matchLog").add(cleanData(entry)).catch(function(){});
