}
function playerLogEntries(players, myIdxIsHost){
  var arr = [];
  for (var i=0;i<players.length;i++){
    var p = players[i];
    arr.push({ key: p.userKey || null, pseudo: p.name || "?" });
  }
  return arr;
}
function winnerPseudoFromRanking(players, reason){
  var ranking = rankPlayers(players);
  if (!ranking.length) return null;
  var top = players[ranking[0]];
  if (top.forfeit || top.out) return null;
  return top.name;
}

/* ---------- ADMIN AUTH ---------- */
var adminSignedIn = false;
function setAdminStatus(msg, isError){
  var e = qs("admin-status");
  if (!e) return;
  e.textContent = msg || "";
  e.className = "online-status" + (isError ? " online-error" : "");
}
function adminSignIn(){
  var email = qs("admin-email").value.trim();
  var pass = qs("admin-pass").value;
  if (!email || !pass){ setAdminStatus(t("admin_missing"), true); return; }
  setAdminStatus(t("rk_loading"));
  initFirebase().then(function(ok){
    if (!ok){ setAdminStatus(t("st_noconfig"), true); return; }
    firebase.auth().signInWithEmailAndPassword(email, pass).then(function(cred){
      if (cred.user.uid !== ADMIN_UID){
        firebase.auth().signOut();
        setAdminStatus(t("admin_denied"), true);
        return;
      }
      fb.uid = cred.user.uid;
      adminSignedIn = true;
      setAdminStatus("");
      showAdminDashboard();
    }).catch(function(){
      setAdminStatus(t("admin_denied"), true);
    });
  });
}
function adminSignOut(){
  adminSignedIn = false;
  if (typeof firebase !== "undefined"){
    firebase.auth().signOut().then(function(){
      firebase.auth().signInAnonymously().then(function(cred){
        fb.uid = cred.user.uid;
      });
    });
  }
  hideAllScreens();
  show("screen-home");
  window.location.hash = "";
}

function checkAdminRoute(){
  if (window.location.hash === "#admin"){
    hideAllScreens();
    show("screen-admin-login");
    return true;
  }
  return false;
}

/* ---------- DASHBOARD ---------- */
var adminTab = "accounts";
function showAdminDashboard(){
  hideAllScreens();
  show("screen-admin");
  loadAdminTab(adminTab);
}
function loadAdminTab(tabId){
  adminTab = tabId;
  var box = qs("admin-body");
  clear(box);
  box.appendChild(el("div","rk-empty", t("rk_loading")));
  if (tabId === "accounts") renderAdminAccounts(box);
  else if (tabId === "matches") renderAdminMatches(box);
  else if (tabId === "sources") renderAdminSources(box);
}

function renderAdminAccounts(box){
  fb.db.collection("users").orderBy("createdAt","desc").limit(300).get().then(function(qsnap){
    clear(box);
    if (qsnap.empty){ box.appendChild(el("div","rk-empty", t("admin_none"))); return; }
    var summary = el("div","admin-summary", tf("admin_total_accounts", { n: qsnap.size }));
    box.appendChild(summary);
    qsnap.forEach(function(doc){
      var d = doc.data();
      var row = el("div","admin-row");
      row.appendChild(el("span","admin-row-pseudo", d.pseudo || doc.id));
      row.appendChild(el("span","admin-row-country", countryFlag(d.country || "XX")));
      var date = d.createdAt ? new Date(d.createdAt).toLocaleDateString(store.lang==="fr"?"fr-FR":(store.lang==="es"?"es-ES":"en-US")) : "—";
      row.appendChild(el("span","admin-row-date", date));
      var src = d.source || "—";
      var srcLabel = src === "direct" ? t("src_direct") : (src === "twitter" ? t("src_twitter") : (src === "whatsapp" ? t("src_whatsapp") : (src.indexOf("other:")===0 ? t("src_other") : "—")));
      row.appendChild(el("span","admin-row-src", srcLabel));
      box.appendChild(row);
    });
  }).catch(function(err){
    clear(box);
    box.appendChild(el("div","rk-empty", (err && err.code === "permission-denied") ? t("admin_denied") : t("st_err")));
  });
}

function renderAdminMatches(box){
  fb.db.collection("matchLog").orderBy("timestamp","desc").limit(200).get().then(function(qsnap){
    clear(box);
    if (qsnap.empty){ box.appendChild(el("div","rk-empty", t("admin_none"))); return; }
    var summary = el("div","admin-summary", tf("admin_total_matches", { n: qsnap.size }));
    box.appendChild(summary);
    qsnap.forEach(function(doc){
      var d = doc.data();
      var row = el("div","admin-match-row");
      var modeLabel = t("mode_" + (d.mode || "solo").replace("-","_"));
      row.appendChild(el("span","admin-match-mode", modeLabel));
      var names = (d.players || []).map(function(p){ return p.pseudo; }).join(" vs ");
      row.appendChild(el("span","admin-match-names", names || "—"));
      var date = d.timestamp ? new Date(d.timestamp).toLocaleString(store.lang==="fr"?"fr-FR":(store.lang==="es"?"es-ES":"en-US")) : "—";
      row.appendChild(el("span","admin-match-date", date));
      if (d.winnerPseudo){
        row.appendChild(el("span","admin-match-winner", "🏆 " + d.winnerPseudo));
      }
      box.appendChild(row);
    });
  }).catch(function(err){
    clear(box);
    box.appendChild(el("div","rk-empty", (err && err.code === "permission-denied") ? t("admin_denied") : t("st_err")));
  });
}

function initAdminScreen(){
  applyI18n();
  var langBtns = document.querySelectorAll(".lang-chip");
  for (var i=0;i<langBtns.length;i++){
    if (langBtns[i].getAttribute("data-lang") === store.lang) langBtns[i].classList.add("lang-active");
  }
  bindChips(".lang-chip", "lang-active", function(btn){
    store.lang = btn.getAttribute("data-lang"); saveStore(store); applyI18n();
  });
  qs("btn-admin-login").addEventListener("click", adminSignIn);
  qs("btn-admin-logout").addEventListener("click", adminSignOut);
  bindChips(".admin-tab-chip", "tab-active", function(btn){ loadAdminTab(btn.getAttribute("data-admintab")); });
}
function renderAdminSources(box){
  fb.db.collection("users").limit(1000).get().then(function(qsnap){
    clear(box);
    var counts = { direct:0, twitter:0, whatsapp:0, other:0, unknown:0 };
    qsnap.forEach(function(doc){
      var src = doc.data().source;
      if (!src) counts.unknown++;
      else if (src === "direct") counts.direct++;
      else if (src === "twitter") counts.twitter++;
      else if (src === "whatsapp") counts.whatsapp++;
      else counts.other++;
    });
    var total = qsnap.size || 1;
    var items = [
      { key:"direct", label:t("src_direct"), n:counts.direct },
      { key:"twitter", label:t("src_twitter"), n:counts.twitter },
      { key:"whatsapp", label:t("src_whatsapp"), n:counts.whatsapp },
      { key:"other", label:t("src_other"), n:counts.other },
      { key:"unknown", label:t("src_unknown"), n:counts.unknown }
    ];
    for (var i=0;i<items.length;i++){
      var it = items[i];
      var pct = Math.round(it.n / total * 100);
      var row = el("div","admin-src-row");
      row.appendChild(el("span","admin-src-label", it.label));
      var barWrap = el("div","admin-src-barwrap");
      var bar = el("div","admin-src-bar");
      bar.style.width = pct + "%";
      barWrap.appendChild(bar);
      row.appendChild(barWrap);
      row.appendChild(el("span","admin-src-pct", it.n + " (" + pct + "%)"));
      box.appendChild(row);
    }
  }).catch(function(err){
    clear(box);
    box.appendChild(el("div","rk-empty", (err && err.code === "permission-denied") ? t("admin_denied") : t("st_err")));
  });
}
